# CI workflow for infrastructure validation.
# Uses GitHub OIDC -> Azure login (secretless auth pattern).
name: iac-deploy

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

concurrency:
  # Security/ops hardening: prevent overlapping infrastructure validations on same branch.
  group: iac-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # Required for OIDC federation token issuance.
  id-token: write
  # Required to read repository content.
  contents: read

jobs:
  validate-and-whatif:
    # Hosted Linux runner; deterministic environment for az cli usage.
    runs-on: ubuntu-latest
    # Security/ops hardening: keep token lifetime and runner exposure window short.
    timeout-minutes: 20
    env:
      AZURE_LOCATION: westeurope
      RESOURCE_GROUP: rg-saas-dev-platform
    steps:
      # Pull repository content into runner workspace.
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        # Idempotent create; safe if resource group already exists.
        run: |
          az group create --name "$RESOURCE_GROUP" --location "$AZURE_LOCATION"

      - name: Validate Bicep
        # Static + server-side ARM validation for template correctness.
        run: |
          az bicep install
          az deployment group validate \
            --resource-group "$RESOURCE_GROUP" \
            --template-file main.bicep \
            --parameters location="$AZURE_LOCATION" environment=dev projectPrefix=saas

      - name: What-if
        # Change preview gate; helps detect destructive drift before apply.
        run: |
          az deployment group what-if \
            --resource-group "$RESOURCE_GROUP" \
            --template-file main.bicep \
            --parameters location="$AZURE_LOCATION" environment=dev projectPrefix=saas
