# -----------------------------------------------------------------------------
# FILE: Template copy of IaC workflow kept with infrastructure code.
# USED IN SAAS FLOW: Reference workflow for teams creating or extending secure deployment pipelines.
# SECURITY-CRITICAL: Mirrors OIDC + least-privilege + validation/what-if safety gates.
# -----------------------------------------------------------------------------
# Infrastructure CI workflow for Azure Bicep code.
name: iac-deploy

# Run automatically on PRs to primary branches, and allow manual execution.
on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]

# Prevent overlapping runs on the same branch to avoid conflicting Azure operations.
concurrency:
  group: iac-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token scope: OIDC login + read-only repository access.
permissions:
  id-token: write
  contents: read

jobs:
  static-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # Do not keep checkout credentials in local git config.
          persist-credentials: false
          # Shallow clone is enough for validation and speeds up CI.
          fetch-depth: 1

      - name: Azure CLI check
        run: az version

      - name: Run Bicep compile tests
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          ./secure_azure_saas_iac/tests/scripts/validate-iac.ps1

      - name: Run security assertions
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          ./secure_azure_saas_iac/tests/scripts/assert-security.ps1

  validate-and-whatif:
    needs: [static-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Hide default CLI command output to reduce accidental sensitive log exposure.
      AZURE_CORE_OUTPUT: none
      AZURE_LOCATION: westeurope
      RESOURCE_GROUP: rg-saas-dev-platform
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          # Federated login avoids long-lived cloud secrets in GitHub.
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          set -euo pipefail
          # Idempotent create: safe if RG already exists.
          az group create --name "$RESOURCE_GROUP" --location "$AZURE_LOCATION"

      - name: Validate Bicep
        run: |
          set -euo pipefail
          az bicep install
          # Server-side template validation catches ARM-level errors early.
          az deployment group validate \
            --resource-group "$RESOURCE_GROUP" \
            --template-file secure_azure_saas_iac/main.bicep \
            --parameters location="$AZURE_LOCATION" environment=dev projectPrefix=saas

      - name: What-if
        run: |
          set -euo pipefail
          # Preview changes before apply to detect destructive drift in PR stage.
          az deployment group what-if \
            --resource-group "$RESOURCE_GROUP" \
            --template-file secure_azure_saas_iac/main.bicep \
            --parameters location="$AZURE_LOCATION" environment=dev projectPrefix=saas
